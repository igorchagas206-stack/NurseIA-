<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NursingApp — Enfermagem</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-sec: #f3f3f3;
      --text: #1a1a1a;
      --green: #1D9E75;
    }

    body {
      font-family: Arial;
      background: var(--bg-sec);
      padding: 15px;
    }

    .app {
      max-width: 720px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h2 { margin-bottom: 10px; }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .tab {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background: #eee;
      border-radius: 8px;
    }

    .tab.active {
      background: var(--green);
      color: white;
    }

    .section { display: none; }
    .section.active { display: block; }

    .quiz-opt {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: white;
    }

    .correct { background: #c8f7c5 !important; }
    .wrong { background: #f7c5c5 !important; }

    button.next {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    input {
      display: block;
      margin: 6px 0;
      padding: 8px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="app">
  <h2>NursingApp</h2>

  <div class="tabs">
    <button class="tab active" onclick="show('quiz', this)">Quiz</button>
    <button class="tab" onclick="show('calc', this)">IMC</button>
    <button class="tab" onclick="show('proc', this)">Procedimentos</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="section active">
    <h3 id="qtitle"></h3>
    <div id="qopts"></div>
    <p id="qexp"></p>

    <button class="next" onclick="next()">Próxima</button>
    <p>Pontos: <span id="score">0</span></p>
  </div>

  <!-- IMC -->
  <div id="calc" class="section">
    <h3>Calculadora IMC</h3>
    <input id="peso" placeholder="Peso (kg)" oninput="imc()">
    <input id="alt" placeholder="Altura (m)" oninput="imc()">
    <p id="res"></p>
  </div>

  <!-- PROC -->
  <div id="proc" class="section">
    <h3>Procedimentos</h3>
    <p>Conteúdo mantido do seu sistema.</p>
  </div>
</div>

<script>

const questions = [
  {q:"Antídoto benzodiazepínico?", o:["Naloxona","Flumazenil","Atropina","Adrenalina"], a:1, e:"Flumazenil reverte benzodiazepínicos."},
  {q:"Via mais rápida?", o:["IM","SC","VO","IV"], a:3, e:"IV é imediata."},
  {q:"Bradicardia usa?", o:["Atropina","AAS","Insulina","Morfina"], a:0, e:"Atropina aumenta FC."},
  {q:"Diafragma nervo?", o:["Vago","Frênico","Ulnar","Femoral"], a:1, e:"Frênico C3-C5."},
  {q:"Nó SA fica?", o:["VE","VD","AD","AE"], a:2, e:"Átrio direito."},
  {q:"SpO2 baixa?", o:["<95","<90","<80","<70"], a:1, e:"<90 hipoxemia."},
  {q:"Glasgow avalia?", o:["Dor","Consciência","Reflexo","Pulso"], a:1, e:"Consciência."},
  {q:"Choque posição?", o:["Fowler","Trendelenburg","Sentado","Lateral"], a:1, e:"Trendelenburg."},
  {q:"Valva esquerda?", o:["Tricúspide","Mitral","Pulmonar","Aórtica"], a:1, e:"Mitral."},
  {q:"Insulina regular início?", o:["30-60min","5min","2h","12h"], a:0, e:"30–60 min."},
  {q:"PA normal?", o:["120/80","200/100","90/60","140/100"], a:0, e:"Normal 120/80."},
  {q:"Febre é acima de?", o:["36","37","38","39"], a:2, e:"38°C."},
];

let i = 0;
let score = 0;
let locked = false;

function load(){
  locked = false;

  const q = questions[i];
  document.getElementById("qtitle").innerText = q.q;

  const div = document.getElementById("qopts");
  div.innerHTML = "";

  document.getElementById("qexp").innerText = "";

  q.o.forEach((opt, idx)=>{
    const b = document.createElement("button");
    b.innerText = opt;
    b.className = "quiz-opt";
    b.onclick = ()=>answer(idx, b);
    div.appendChild(b);
  });
}

function answer(idx, btn){
  if(locked) return;
  locked = true;

  const q = questions[i];
  const buttons = document.querySelectorAll(".quiz-opt");

  // limpa antes de marcar
  buttons.forEach(b => {
    b.classList.remove("correct");
    b.classList.remove("wrong");
  });

  buttons[q.a].classList.add("correct");

  if(idx === q.a){
    score++;
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("score").innerText = score;
  document.getElementById("qexp").innerText = q.e;
}

function next(){
  i++;
  if(i >= questions.length) i = 0;
  load();
}

function show(id, el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

// IMC
function imc(){
  let p = parseFloat(document.getElementById("peso").value);
  let a = parseFloat(document.getElementById("alt").value);

  if(!p || !a) return;

  let r = p / (a * a);
  document.getElementById("res").innerText = "IMC: " + r.toFixed(1);
}

load();

</script>

</body>
</html>
